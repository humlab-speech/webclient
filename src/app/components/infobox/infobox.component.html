<article class="info-card" [ngSwitch]="infobox.name">
  <div class="info-icon-wrap">
    <span class="tile-icon pale" *ngIf="infobox.name === 'data-management'">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="7" ry="3"/><path d="M5 5v6c0 1.66 3.13 3 7 3s7-1.34 7-3V5"/><path d="M5 11v6c0 1.66 3.13 3 7 3s7-1.34 7-3v-6"/></svg>
    </span>

    <span class="tile-icon pale" *ngIf="infobox.name === 'help-and-guides'">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M11 12h1v4h1"/></svg>
    </span>

    <h4>{{ infobox.title }}</h4>
  </div>

  <p>{{ infobox.body }}</p>

  <div class="resource-list" *ngSwitchCase="'help-and-guides'">
    <a href="#" class="resource-button" *ngIf="userIsLoggedIn" (click)="tutorial(); $event.preventDefault()">
      <span class="resource-left">
        <span class="resource-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M12 11v5"/></svg>
        </span>
        VISP Tutorial
      </span>
      <span class="resource-arrow">↗</span>
    </a>

    <a *ngIf="emuWebAppEnabled" href="https://ips-lmu.github.io/The-EMU-SDMS-Manual" target="_blank" class="resource-button">
      <span class="resource-left">
        <span class="resource-icon">
          <svg viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v14.5A2.5 2.5 0 0 0 17.5 15H4z"/><path d="M4 5.5V21l2-1 2 1 2-1 2 1 2-1 2 1"/><path d="M17.5 15A2.5 2.5 0 0 0 15 17.5"/></svg>
        </span>
        EMU Manual
      </span>
      <span class="resource-arrow">↗</span>
    </a>

    <a href="mailto:support@humlab.umu.se" target="_blank" class="resource-button">
      <span class="resource-left">
        <span class="resource-icon">
          <svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z"/><path d="m4 8 8 5 8-5"/></svg>
        </span>
        E-mail support
      </span>
      <span class="resource-arrow">↗</span>
    </a>
  </div>

</article>
