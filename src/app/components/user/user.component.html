@if (userIsSignedIn) {
  <div class="account" (mouseover)="showAccountMenu(true)" (mouseout)="showAccountMenu(false, true)">
    <div class="account-container">
      <div class="user-displayname" (notify)="onNotify($event)">
        <i class="fa fa-user-circle-o" aria-hidden="true"></i>
        &nbsp;
        {{ getUserDisplayName() }}
      </div>
    </div>
    @if (accountMenuVisible) {
      <ul class="account-menu-dropdown">
        @if (showInviteCodesMenuOption) {
          <li (click)="showInviteCodesDialog()"><i class="fa fa-envelope" aria-hidden="true"></i> Invite user</li>
        }
        <li (click)="showHelpDialog()"><i class="fa fa-question-circle" aria-hidden="true"></i> Help</li>
        <li (click)="signOut()"><i class="fa fa-sign-out" aria-hidden="true"></i> Sign out</li>
      </ul>
    }
  </div>
}
