<div class="account" *ngIf="userIsSignedIn" (mouseover)="showAccountMenu(true)" (mouseout)="showAccountMenu(false, true)">
  <button class="profile-pill" aria-label="Account menu">
    <span class="profile-avatar">{{ getUserInitials() }}</span>
    <span class="profile-meta">
      <strong>{{ getUserDisplayName() }}</strong>
      <span>{{ getUserRole() }}</span>
    </span>
    <i class="fa fa-angle-down" aria-hidden="true"></i>
  </button>

  <ul *ngIf="accountMenuVisible" class="account-menu-dropdown">
    <li *ngIf="isAdmin" (click)="openAdminPanel()"><i class="fa fa-cogs" aria-hidden="true"></i> Admin</li>
    <li *ngIf="showInviteCodesMenuOption" (click)="showInviteCodesDialog()"><i class="fa fa-envelope" aria-hidden="true"></i> Invite user</li>
    <li (click)="showHelpDialog()"><i class="fa fa-question-circle" aria-hidden="true"></i> Help</li>
    <li (click)="signOut()"><i class="fa fa-sign-out" aria-hidden="true"></i> Sign out</li>
  </ul>
</div>

<div class="account" *ngIf="!userIsSignedIn">
  <button class="signin-pill" (click)="signIn()">
    <i class="fa fa-user-circle-o" aria-hidden="true"></i>
    <span>Sign in</span>
  </button>
</div>
