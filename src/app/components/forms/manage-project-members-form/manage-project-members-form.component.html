<div [formGroup]="form" class="members-form-root">

  <div *ngIf="userIsProjectAdmin()" class="member-controls-card">
    <div class="form-control-pair-container">
      <div (click)="toggleMemberSearch()" class="form-control-pair-label">
          <i class="fa fa-plus-circle" aria-hidden="true"></i>
          &nbsp;
          Add member
      </div>
      
      <div id="search-user-input" class="form-control-pair-input">
          <label for="search-user-control">Search user:&nbsp;</label>
          <div>
              <input type="text" id="search-user-control" placeholder="Type name or e-mail" (input)="onInput($event)" />
              <div id="user-select-options">
                  <ul class="select-search-results-list" *ngFor="let searchUser of searchUsers">
                      <li (click)="addMember(searchUser)" class="search-option-user-container">
                          {{searchUser.fullName}} ({{searchUser.eppn}})
                      </li>
                  </ul>
              </div>
          </div>
      </div>
    </div>
  </div>

  <div class="member-table-card">
    <table class="project-members-table">
      <thead>
          <tr>
              <th *ngIf="userIsProjectAdmin()" class="col-del">Del</th>
              <th class="col-role">Role</th>
              <th>Name</th>
              <th>EPPN</th>
          </tr>
      </thead>
      <tbody formArrayName="members">
          <tr *ngIf="members.controls.length == 0">
              <td [attr.colspan]="userIsProjectAdmin() ? 4 : 3" class="empty-row">No members found.</td>
          </tr>
          <tr *ngFor="let member of members.controls; let i = index" [formGroupName]="i">
              <td *ngIf="userIsProjectAdmin()" class="col-del">
                  <i class="fa fa-minus-circle remove-member-btn" (click)="removeMember(member)" aria-hidden="true"></i>
              </td>
              <td *ngIf="userIsProjectAdmin()" class="col-role">
                  <select class="member-role-select" [formControl]="member.get('role')" (change)="updateRole(member)">
                      <option value="admin">Admin</option>
                      <option value="analyzer">Analyzer</option>
                      <option value="transcriber">Transcriber</option>
                  </select>
              </td>
              <td *ngIf="!userIsProjectAdmin()" class="col-role">
                  <span class="role-pill">{{ member.get('role').value }}</span>
              </td>
              <td>
                  {{ member.get('fullName').value }}
              </td>
              <td>
                  {{ member.get('eppn').value }}
              </td>
          </tr>
      </tbody>
    </table>
  </div>
    
  <!--
  <br />
  <button id="member-form-save-button" [ngClass]="{'disabled': !submitBtnEnabled}" [disabled]="!submitBtnEnabled" (click)="saveForm()">
      <img *ngIf="showLoadingIndicator" src="../../../../assets/loading-indicator-4-light.svg">
      <i *ngIf="!showLoadingIndicator" class="fa fa-save" aria-hidden="true"></i>
      &nbsp;
      {{ submitBtnLabel }}
  </button>
  -->
</div>
